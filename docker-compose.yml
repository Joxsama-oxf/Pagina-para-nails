#  Laura Nails Beauty Studio
#  Levanta todo con:   docker compose up --build
# ============================================================
services:
  web:
    build: .
    container_name: laura_nails
    restart: unless-stopped

    # Variables de entorno directas (más confiable que env_file)
    environment:
      - SECRET_KEY=clave-super-secreta-para-laura-nails-2026
      - FLASK_ENV=production

    # Puerto: localhost:8001 -> contenedor:8000
    # Si 8001 está ocupado, cámbialo por otro (ej: 8080:8000)
    ports:
      - "8001:8000"

    # La base de datos SQLite persiste en ./instance del host
    volumes:
      - ./instance:/app/instance