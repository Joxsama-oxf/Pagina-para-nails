{% extends "base.html" %}
{% block content %}
<style>
    .login-wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;
        background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),url('/static/01_local.jpeg');
        background-size:cover;background-position:center;background-repeat:no-repeat;}
    .login-box{width:100%;max-width:400px;padding:35px;background:white;border-radius:12px;
        box-shadow:0 8px 30px rgba(0,0,0,0.6);}
    .login-box input{width:100%;padding:10px;margin-top:5px;box-sizing:border-box;
        border:1px solid #ddd;border-radius:6px;font-size:0.95rem;}
    .login-box input:focus{border-color:#d63384;outline:none;box-shadow:0 0 0 3px rgba(214,51,132,0.15);}
    .btn-login{width:100%;padding:12px;background:#d63384;color:white;border:none;
        border-radius:6px;cursor:pointer;font-size:1rem;font-weight:700;margin-top:15px;transition:0.2s;}
    .btn-login:hover{background:#c2185b;}
    .alert-error{background:#f8d7da;color:#721c24;padding:12px;border-radius:6px;margin-bottom:15px;font-size:0.9rem;}
</style>
<div class="login-wrapper">
    <div class="login-box">
        <h2 style="text-align:center;color:#d63384;font-family:'Playfair Display',serif;margin-bottom:5px;">Laura Nails</h2>
        <p style="text-align:center;color:#888;font-size:0.9rem;margin-bottom:25px;">Sistema de Gestión</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert-error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div style="margin-bottom:15px;">
                <label style="color:#333;font-weight:600;font-size:0.9rem;">Correo Electrónico</label>
                <input type="email" name="email" required placeholder="correo@ejemplo.com" autocomplete="email">
            </div>
            <div style="margin-bottom:10px;">
                <label style="color:#333;font-weight:600;font-size:0.9rem;">Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
    </div>
</div>
{% endblock %}
