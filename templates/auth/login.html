{% extends "base.html" %}

{% block content %}
<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: -20px; /* Ajuste para compensar márgenes predeterminados */
        background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('/static/01_local.jpeg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .login-box {
        width: 100%;
        max-width: 400px;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
</style>

<div class="login-wrapper">
    <div class="login-box">
        <h2 style="text-align: center; color: #d63384;">💅 Laura Nails</h2>
        <h3 style="text-align: center; color: #666;">Iniciar Sesión</h3>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div style="margin-bottom: 15px;">
                <label style="color: #333; font-weight: bold;">Correo Electrónico:</label>
                <input type="email" name="email" required style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="color: #333; font-weight: bold;">Contraseña:</label>
                <input type="password" name="password" required style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <button type="submit" style="width: 100%; padding: 10px; background: #d63384; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px;">
                Ingresar
            </button>
        </form>
    </div>
</div>
{% endblock %}
