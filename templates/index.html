{% extends "base.html" %}

{% block title %}Inicio - Laura Nails{% endblock %}

{% block content %}

<style>
    /* 1. EL SLIDESHOW DE FONDO */
    .fondo-carrusel {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
    }
    .carousel-item { height: 100vh; background-color: #000; }
    .carousel-item img { width: 100%; height: 100%; object-fit: cover; }

    /* 2. OVERLAY OSCURO (Para que el texto blanco se lea bien) */
    .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5); /* Un poco más oscuro (50%) para elegancia */
        z-index: 1; pointer-events: none;
    }

    /* 3. CONTENIDO CENTRAL (Estilo Editorial) */
    .contenido-frente {
        position: relative; z-index: 10; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        text-align: center; color: white;
    }

    /* TÍTULO GIGANTE Y ELEGANTE */
    .titulo-hero {
        font-family: 'Playfair Display', serif; /* Fuente de lujo */
        font-size: 5rem; /* Muy grande */
        font-weight: 700;
        margin: 0;
        /* Sombra suave para separarlo del fondo */
        text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        letter-spacing: 2px;
        animation: subir 1s ease-out;
    }

    /* SUBTÍTULO O DETALLE ROSA */
    .subtitulo-hero {
        font-family: 'Poppins', sans-serif;
        font-size: 1.2rem;
        font-weight: 300;
        text-transform: uppercase;
        letter-spacing: 5px;
        margin-top: 10px;
        color: #ffb6c1; /* Un rosa pastel muy claro y elegante */
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        animation: subir 1.2s ease-out;
    }

    /* LÍNEA DECORATIVA */
    .linea-separadora {
        width: 100px; height: 3px;
        background-color: #d63384; /* Tu rosa fuerte característico */
        margin: 20px auto;
        border-radius: 2px;
        box-shadow: 0 0 10px rgba(214, 51, 132, 0.8); /* Glow rosa */
        animation: expandir 1.5s ease-out;
    }

    /* FECHA FLOTANTE */
    .fecha-flotante {
        position: absolute; top: 20px; right: 30px;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 300; font-size: 0.9rem; letter-spacing: 1px;
        z-index: 20;
    }

    @keyframes subir { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes expandir { from { width: 0px; opacity: 0; } to { width: 100px; opacity: 1; } }
</style>

{% if current_user.is_authenticated %}

    <div class="fecha-flotante" id="fecha-actual"></div> 
    <div id="carruselFondo" class="carousel slide carousel-fade fondo-carrusel" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="false" data-bs-wrap="true">
        <div class="carousel-inner">
            <div class="carousel-item active"><img src="{{ url_for('static', filename='01_local.jpeg') }}" alt="Local 1"></div>
            <div class="carousel-item"><img src="{{ url_for('static', filename='02_local.jpeg') }}" alt="Local 2"></div>
            <div class="carousel-item"><img src="{{ url_for('static', filename='03_local.jpeg') }}" alt="Local 3"></div>
            <div class="carousel-item"><img src="{{ url_for('static', filename='04_local.jpeg') }}" alt="Local 4"></div>
            <div class="carousel-item"><img src="{{ url_for('static', filename='05_local.jpeg') }}" alt="Local 5"></div>
        </div>
        <div class="overlay"></div>
    </div>

    <div class="contenido-frente">
        <h1 class="titulo-hero">Bienvenido/a</h1>

        <div class="linea-separadora"></div>

        <div class="subtitulo-hero">Sistema de Gestión</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hoy = new Date();
            const dia = String(hoy.getDate()).padStart(2, '0');
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const anio = hoy.getFullYear();
            document.getElementById('fecha-actual').innerText = `${dia}.${mes}.${anio}`;
        });
    </script>

{% else %}
    <script>window.location.href = "{{ url_for('auth.login') }}";</script>
{% endif %}

{% endblock %}
